# azd configuration for the Power BI Modeling MCP server.
# https://learn.microsoft.com/azure/developer/azure-developer-cli/azd-schema
#
# Run `azd up` to provision Azure resources (infra/main.bicep) and deploy
# the App Service. Run `azd down` to tear it all down.
#
# The X-Api-Key shared secret is generated by Bicep (`newGuid()` × 2) on
# first provision and cached in the azd environment by `azd` itself, so
# subsequent `azd up` runs reuse the same value.

name: pbi-modeling-mcp
metadata:
  template: pbi-modeling-mcp@0.1.0

# Override the default `rg-<env>` so resource groups land under a stable
# prefix that signals "this is the server side of the PBI Modeling MCP".
resourceGroup: rg-pbi-mcp-server-${AZURE_ENV_NAME}

services:
  pbi-modeling:
    project: ./src/PbiModelingMcp
    language: dotnet
    host: appservice

# After every provision, copy the resolved PBI_MCP__HttpAuthToken App
# Setting back into `azd env` as HTTP_AUTH_TOKEN. On first deploy the
# Bicep generates the token (newGuid()); on subsequent deploys the
# cached value is fed back into the parameter, so the App Setting
# stays stable across `azd up` re-runs and clients (VS Code's
# `mcp.json`) don't need to re-paste a fresh key after every deploy.
hooks:
  postprovision:
    posix:
      shell: sh
      run: |
        set -e
        if [ -z "$HTTP_AUTH_TOKEN" ] && [ -n "$PBI_MCP_APP_SERVICE_NAME" ]; then
          token=$(az webapp config appsettings list \
            --name "$PBI_MCP_APP_SERVICE_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "[?name=='PBI_MCP__HttpAuthToken'].value" -o tsv)
          if [ -n "$token" ]; then
            azd env set HTTP_AUTH_TOKEN "$token"
            echo "Cached HTTP_AUTH_TOKEN from App Settings (${#token} chars)."
          fi
        fi
    windows:
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        if (-not $env:HTTP_AUTH_TOKEN -and $env:PBI_MCP_APP_SERVICE_NAME) {
          $token = az webapp config appsettings list `
            --name $env:PBI_MCP_APP_SERVICE_NAME `
            --resource-group $env:AZURE_RESOURCE_GROUP `
            --query "[?name=='PBI_MCP__HttpAuthToken'].value" -o tsv
          if ($token) {
            azd env set HTTP_AUTH_TOKEN $token
            Write-Host "Cached HTTP_AUTH_TOKEN from App Settings ($($token.Length) chars)."
          }
        }

